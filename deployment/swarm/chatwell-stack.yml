version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chatwell_pro
      POSTGRES_USER: chatwell
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatwell_backend
    secrets:
      - db_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwell -d chatwell_pro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    networks:
      - chatwell_backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Main App (app.chatwell.pro)
  app:
    image: ${REGISTRY:-localhost:5000}/chatwell-pro:${TAG:-latest}
    environment:
      NODE_ENV: production
      SERVICE_TYPE: app
      DATABASE_URL: postgresql://chatwell:${DB_PASSWORD}@postgres:5432/chatwell_pro
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      REDIS_URL: redis://redis:6379

      # URLs
      APP_URL: https://app.chatwell.pro
      API_URL: https://api.chatwell.pro
      AUTH_URL: https://auth.chatwell.pro
      HOOKS_URL: https://hooks.chatwell.pro
      CDN_URL: https://cdn.chatwell.pro
      STATUS_URL: https://status.chatwell.pro
      DOCS_URL: https://docs.chatwell.pro
    networks:
      - chatwell_frontend
      - chatwell_backend
    secrets:
      - jwt_secret
      - google_client_secret
      - email_password
      - waha_api_key
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.app.rule=Host(`app.chatwell.pro`)
        - traefik.http.routers.app.tls=true
        - traefik.http.routers.app.tls.certresolver=letsencrypt
        - traefik.http.services.app.loadbalancer.server.port=3000
        - traefik.docker.network=chatwell_frontend
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Service (api.chatwell.pro)
  api:
    image: ${REGISTRY:-localhost:5000}/chatwell-pro:${TAG:-latest}
    environment:
      NODE_ENV: production
      SERVICE_TYPE: api
      DATABASE_URL: postgresql://chatwell:${DB_PASSWORD}@postgres:5432/chatwell_pro
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      REDIS_URL: redis://redis:6379
    networks:
      - chatwell_frontend
      - chatwell_backend
    secrets:
      - jwt_secret
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.api.rule=Host(`api.chatwell.pro`)
        - traefik.http.routers.api.tls=true
        - traefik.http.routers.api.tls.certresolver=letsencrypt
        - traefik.http.services.api.loadbalancer.server.port=3000
        - traefik.docker.network=chatwell_frontend
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Auth Service (auth.chatwell.pro)
  auth:
    image: ${REGISTRY:-localhost:5000}/chatwell-pro:${TAG:-latest}
    environment:
      NODE_ENV: production
      SERVICE_TYPE: auth
      DATABASE_URL: postgresql://chatwell:${DB_PASSWORD}@postgres:5432/chatwell_pro
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      REDIS_URL: redis://redis:6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
    networks:
      - chatwell_frontend
      - chatwell_backend
    secrets:
      - jwt_secret
      - google_client_secret
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.auth.rule=Host(`auth.chatwell.pro`)
        - traefik.http.routers.auth.tls=true
        - traefik.http.routers.auth.tls.certresolver=letsencrypt
        - traefik.http.services.auth.loadbalancer.server.port=3000
        - traefik.docker.network=chatwell_frontend

  # Webhook Service (hooks.chatwell.pro)
  hooks:
    image: ${REGISTRY:-localhost:5000}/chatwell-pro:${TAG:-latest}
    environment:
      NODE_ENV: production
      SERVICE_TYPE: hooks
      DATABASE_URL: postgresql://chatwell:${DB_PASSWORD}@postgres:5432/chatwell_pro
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      REDIS_URL: redis://redis:6379
    networks:
      - chatwell_frontend
      - chatwell_backend
    secrets:
      - jwt_secret
      - waha_api_key
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.hooks.rule=Host(`hooks.chatwell.pro`)
        - traefik.http.routers.hooks.tls=true
        - traefik.http.routers.hooks.tls.certresolver=letsencrypt
        - traefik.http.services.hooks.loadbalancer.server.port=3000
        - traefik.docker.network=chatwell_frontend

  # Status/Health Service (status.chatwell.pro)
  status:
    image: ${REGISTRY:-localhost:5000}/chatwell-pro:${TAG:-latest}
    environment:
      NODE_ENV: production
      SERVICE_TYPE: status
      DATABASE_URL: postgresql://chatwell:${DB_PASSWORD}@postgres:5432/chatwell_pro
      REDIS_URL: redis://redis:6379
    networks:
      - chatwell_frontend
      - chatwell_backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.status.rule=Host(`status.chatwell.pro`)
        - traefik.http.routers.status.tls=true
        - traefik.http.routers.status.tls.certresolver=letsencrypt
        - traefik.http.services.status.loadbalancer.server.port=3000
        - traefik.docker.network=chatwell_frontend

  # API Documentation (docs.chatwell.pro)
  docs:
    image: ${REGISTRY:-localhost:5000}/chatwell-pro:${TAG:-latest}
    environment:
      NODE_ENV: production
      SERVICE_TYPE: docs
      API_URL: https://api.chatwell.pro
    networks:
      - chatwell_frontend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.docs.rule=Host(`docs.chatwell.pro`)
        - traefik.http.routers.docs.tls=true
        - traefik.http.routers.docs.tls.certresolver=letsencrypt
        - traefik.http.services.docs.loadbalancer.server.port=3000
        - traefik.docker.network=chatwell_frontend

  # CDN/Static Files (cdn.chatwell.pro)
  cdn:
    image: nginx:alpine
    volumes:
      - cdn_data:/usr/share/nginx/html
      - ./nginx/cdn.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chatwell_frontend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.cdn.rule=Host(`cdn.chatwell.pro`)
        - traefik.http.routers.cdn.tls=true
        - traefik.http.routers.cdn.tls.certresolver=letsencrypt
        - traefik.http.services.cdn.loadbalancer.server.port=80
        - traefik.docker.network=chatwell_frontend

  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    command:
      - --api.dashboard=true
      - --api.debug=true
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=chatwell_frontend
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8080
        published: 8080
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - chatwell_frontend
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.http.routers.traefik.rule=Host(`traefik.chatwell.pro`)
        - traefik.http.routers.traefik.tls=true
        - traefik.http.routers.traefik.tls.certresolver=letsencrypt
        - traefik.http.routers.traefik.service=api@internal
        - traefik.http.services.traefik.loadbalancer.server.port=8080

networks:
  chatwell_frontend:
    driver: overlay
    attachable: true
  chatwell_backend:
    driver: overlay

volumes:
  postgres_data:
    driver: local
  cdn_data:
    driver: local
  traefik_letsencrypt:
    driver: local

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
  google_client_secret:
    external: true
  email_password:
    external: true
  waha_api_key:
    external: true