version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatwell
      POSTGRES_USER: chatwell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatwell_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwell"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - chatwell_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chatwell Application
  chatwell:
    image: tomautomations/chatwell-pro:latest
    environment:
      # Database
      DATABASE_URL: postgresql://chatwell:${POSTGRES_PASSWORD}@postgres:5432/chatwell

      # Redis (opcional, se você implementar cache)
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Email Configuration
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}

      # Google OAuth (opcional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # WhatsApp API (WAHA)
      WAHA_BASE_URL: ${WAHA_BASE_URL:-}
      WAHA_API_KEY: ${WAHA_API_KEY:-}

      # Next.js
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    networks:
      - chatwell_network
      - traefik_public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        # Traefik Configuration
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"

        # HTTP Router
        - "traefik.http.routers.chatwell.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.chatwell.entrypoints=websecure"
        - "traefik.http.routers.chatwell.tls=true"
        - "traefik.http.routers.chatwell.tls.certresolver=letsencrypt"

        # Service
        - "traefik.http.services.chatwell.loadbalancer.server.port=3000"
        - "traefik.http.services.chatwell.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.chatwell.loadbalancer.sticky.cookie.name=chatwell_session"

        # Middleware - Security Headers
        - "traefik.http.middlewares.chatwell-headers.headers.customResponseHeaders.X-Robots-Tag=noindex,nofollow,nosnippet,noarchive,notranslate,noimageindex"
        - "traefik.http.middlewares.chatwell-headers.headers.sslRedirect=true"
        - "traefik.http.middlewares.chatwell-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.chatwell-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.chatwell-headers.headers.stsPreload=true"
        - "traefik.http.middlewares.chatwell-headers.headers.forceSTSHeader=true"

        # HTTP to HTTPS Redirect
        - "traefik.http.routers.chatwell-http.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.chatwell-http.entrypoints=web"
        - "traefik.http.routers.chatwell-http.middlewares=redirect-to-https@docker"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

        # Apply middlewares
        - "traefik.http.routers.chatwell.middlewares=chatwell-headers"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  chatwell_network:
    driver: overlay
    attachable: true
  traefik_public:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local