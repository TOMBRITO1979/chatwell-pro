version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatwell
      POSTGRES_USER: chatwell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatwell_secure_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatwell_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwell"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password_2024}
    volumes:
      - redis_data:/data
    networks:
      - chatwell_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chatwell Application
  chatwell:
    image: tomautomations/chatwell-pro:latest
    environment:
      # Database
      DATABASE_URL: postgresql://chatwell:${POSTGRES_PASSWORD:-chatwell_secure_password_2024}@postgres:5432/chatwell

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379

      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_here_change_this}

      # Email Configuration
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}

      # Google OAuth (opcional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # WhatsApp API (WAHA)
      WAHA_BASE_URL: ${WAHA_BASE_URL:-}
      WAHA_API_KEY: ${WAHA_API_KEY:-}

      # Next.js
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - chatwell_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  chatwell_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
